<head>
<meta charset="UTF-8">

<style>
  :root {
    --gold: #D4A843;
    --deep: #1A0A00;
    --warm: #2D1500;
    --card: #1E0E02;
    --cream: #FFF8EE;
    --accent: #E85D26;
    --border: rgba(212,168,67,0.18);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { scroll-behavior:smooth; }

  body {
    background: var(--deep);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top:0; z-index:100;
    background: rgba(26,10,0,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items:center; justify-content:space-between;
  }

  .logo {
    font-family:'Playfair Display',serif;
    font-size:22px; color:var(--gold);
  }
  .logo span { color:var(--cream); font-style:italic; }

  .menu-badge {
    font-size:10px; letter-spacing:3px; text-transform:uppercase;
    color:var(--gold); border:1px solid var(--border);
    padding:5px 12px;
  }

  /* ── SEARCH ── */
  .search-wrap { padding:16px 20px 0; }
  .search-input {
    width:100%; background:var(--card);
    border:1px solid var(--border); padding:12px 16px;
    color:var(--cream); font-family:'DM Sans',sans-serif;
    font-size:14px; outline:none;
  }
  .search-input:focus { border-color:var(--gold); }
  .search-input::placeholder { color:#6b4a2a; }

  /* ── CATEGORY TABS ── */
  .tabs-outer { padding:14px 20px 0; overflow-x:auto; scrollbar-width:none; }
  .tabs-outer::-webkit-scrollbar { display:none; }
  .tabs { display:flex; gap:8px; width:max-content; }
  .tab {
    padding:7px 16px;
    border:1px solid var(--border);
    background:transparent; color:#a07850;
    font-size:11px; letter-spacing:1.5px;
    text-transform:uppercase; white-space:nowrap;
    cursor:pointer; font-family:'DM Sans',sans-serif;
    transition:all .25s;
  }
  .tab.active { background:var(--gold); color:var(--deep); border-color:var(--gold); font-weight:700; }

  /* ── DISH LIST ── */
  .menu-body { padding:24px 20px 40px; }

  .cat-title-row {
    display:flex; align-items:center; gap:10px;
    margin-bottom:16px; margin-top:8px;
  }
  .cat-icon-big { font-size:22px; }
  .cat-name {
    font-family:'Playfair Display',serif;
    font-size:20px; color:var(--gold);
  }
  .cat-line {
    flex:1; height:1px;
    background:linear-gradient(90deg,var(--border),transparent);
  }

  /* ── DISH ROW ── */
  .dish-row {
    display:flex; align-items:center;
    gap:16px; padding:14px 0;
    border-bottom:1px solid var(--border);
    cursor:pointer;
    transition:background .2s;
    position:relative;
  }
  .dish-row:active { background:rgba(212,168,67,0.04); }

  /* Photo box */
  .dish-photo {
    width:80px; height:80px;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:42px;
    position:relative; overflow:hidden;
    border:1px solid var(--border);
    transition:border-color .3s;
  }
  .dish-row:hover .dish-photo { border-color:var(--gold); }

  /* Camera icon overlay on photo */
  .cam-overlay {
    position:absolute; inset:0;
    background:rgba(26,10,0,0.65);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    opacity:0; transition:opacity .3s;
    gap:2px;
  }
  .dish-row:hover .cam-overlay { opacity:1; }
  .cam-overlay .cam { font-size:18px; }
  .cam-overlay .cam-txt { font-size:7px; letter-spacing:1.5px; color:var(--gold); text-transform:uppercase; }

  /* Dish info */
  .dish-info { flex:1; min-width:0; }
  .dish-name {
    font-family:'Playfair Display',serif;
    font-size:16px; margin-bottom:3px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .dish-price {
    color:var(--gold); font-size:14px;
    font-weight:600; margin-bottom:3px;
  }
  .dish-desc {
    font-size:11px; color:#a07850;
    line-height:1.4;
    display:-webkit-box; -webkit-line-clamp:2;
    -webkit-box-orient:vertical; overflow:hidden;
  }

  /* Badge */
  .dish-badge {
    position:absolute; top:14px; right:0;
    background:var(--accent); color:white;
    font-size:8px; letter-spacing:1px;
    padding:2px 8px; text-transform:uppercase;
  }

  /* AR hint */
  .ar-hint-row {
    font-size:9px; letter-spacing:2px;
    color:rgba(212,168,67,0.5); text-transform:uppercase;
    margin-top:2px;
  }

  .cat-gap { margin-top:28px; }

  /* ── AR VIEWER MODAL ── */
  #arModal {
    position:fixed; inset:0; z-index:500;
    background:#000; display:none;
    flex-direction:column;
  }
  #arModal.open { display:flex; }

  .ar-top {
    position:absolute; top:0;left:0;right:0; z-index:10;
    padding:16px 20px;
    background:linear-gradient(180deg,rgba(0,0,0,0.85),transparent);
    display:flex; align-items:flex-start; justify-content:space-between;
  }

  .ar-dish-name {
    font-family:'Playfair Display',serif;
    font-size:22px; color:white; line-height:1.1;
  }
  .ar-dish-price { color:var(--gold); font-size:14px; font-weight:600; margin-top:3px; }

  .ar-close {
    width:40px;height:40px; border-radius:50%;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.25);
    color:white; font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }

  model-viewer {
    width:100%; flex:1;
    --poster-color:transparent;
    background:radial-gradient(ellipse at 50% 60%, #2D1500, #000);
  }

  .ar-bottom {
    position:absolute; bottom:0;left:0;right:0; z-index:10;
    background:linear-gradient(0deg,rgba(0,0,0,0.92),transparent);
    padding:20px; display:flex; flex-direction:column;
    align-items:center; gap:10px;
  }

  .ar-btn {
    width:100%; max-width:320px;
    padding:15px; background:var(--gold); color:var(--deep);
    border:none; font-family:'DM Sans',sans-serif;
    font-size:13px; font-weight:700; letter-spacing:3px;
    text-transform:uppercase; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:10px;
    transition:all .2s;
  }
  .ar-btn:active { transform:scale(.97); }

  .ar-sub { font-size:10px; color:rgba(255,255,255,0.4); letter-spacing:2px; text-transform:uppercase; }

  .drag-hint {
    position:absolute; top:50%;left:50%;
    transform:translate(-50%,-50%);
    display:flex; flex-direction:column; align-items:center; gap:8px;
    pointer-events:none; animation:hintFade 3.5s forwards; z-index:5;
  }
  @keyframes hintFade{0%{opacity:1}75%{opacity:1}100%{opacity:0}}
  .drag-icon { font-size:36px; animation:wobble 1s ease-in-out infinite alternate; }
  @keyframes wobble{from{transform:rotate(-12deg)}to{transform:rotate(12deg)}}
  .drag-txt { font-size:11px; letter-spacing:2px; color:rgba(255,255,255,0.8); text-transform:uppercase; background:rgba(0,0,0,0.5); padding:4px 12px; }

  footer {
    text-align:center; padding:28px 20px;
    border-top:1px solid var(--border);
    color:#6b4a2a; font-size:12px; line-height:2;
  }
  footer strong { color:var(--gold); }
</style>
</head>

<div id="arModal">

      <div id="posterEmoji" style="font-size:90px;"></div>

    </div>
    <button slot="ar-button" style="display:none;"></button>
  </model-viewer>

  <div class="drag-hint" id="dragHint">
    <div class="drag-icon">🤚</div>
    <div class="drag-txt">Drag to Rotate</div>
  </div>

  <div class="ar-bottom">
    <button class="ar-btn" id="arBtn">

      <span id="arBtnTxt">Open Camera — View in AR</span>
    </button>

</div>

  { cat:'dessert',  name:'Cheese Patties',              price:'₹50',                     desc:'Cheesy patties snack',                                    badge:'Cheesy',  emoji:'🥔', bg:['#f39c12','#d35400'] },
  { cat:'dessert',  name:'Paneer Patties',              price:'₹70',                     desc:'Soft paneer patties',                                     badge:'Veg',     emoji:'🥔', bg:['#e67e22','#a04000'] },
  { cat:'dessert',  name:'Choco Lava Cake',             price:'₹50',                     desc:'Warm chocolate lava cake',                                badge:'🔥 Must', emoji:'🍰', bg:['#5d4037','#3e2723'] },
  { cat:'dessert',  name:'Muffin',                      price:'₹50',                     desc:'Soft fresh baked muffin',                                 badge:'Baked',   emoji:'🧁', bg:['#9c27b0','#6a1b9a'] },
];

const CATS = {
  all:      { label:'All',      icon:'🍽️' },
  pizza:    { label:'Pizza',    icon:'🍕' },
  burger:   { label:'Burger',   icon:'🍔' },
  momos:    { label:'Momos',    icon:'🥟' },
  pasta:    { label:'Pasta',    icon:'🍝' },
  sandwich: { label:'Sandwich', icon:'🥪' },
  roll:     { label:'Roll/Wrap',icon:'🌯' },
  fries:    { label:'Fries',    icon:'🍟' },
  shakes:   { label:'Shakes',   icon:'🥤' },
  coffee:   { label:'Coffee',   icon:'☕' },
  dessert:  { label:'Dessert',  icon:'🍰' },
  bread:    { label:'Bread',    icon:'🍞' },
};

let activeCat = 'all';
let searchQ = '';

// ── Render ──
function render() {
  const body = document.getElementById('menuBody');
  body.innerHTML = '';

  let list = MENU.filter(d => {
    const catOk = activeCat === 'all' || d.cat === activeCat;
    const srchOk = !searchQ || d.name.toLowerCase().includes(searchQ) || d.desc.toLowerCase().includes(searchQ);
    return catOk && srchOk;
  });

  if (!list.length) {
    body.innerHTML = '<p style="text-align:center;color:#6b4a2a;padding:40px;font-size:14px;">No dish found 🥺</p>';
    return;
  }

  // Group by cat
  const groups = {};
  list.forEach(d => { if(!groups[d.cat]) groups[d.cat]=[]; groups[d.cat].push(d); });

  Object.keys(groups).forEach((cat, gi) => {
    const sec = document.createElement('div');
    sec.className = gi > 0 ? 'cat-gap' : '';

    // Category title
    const titleRow = document.createElement('div');
    titleRow.className = 'cat-title-row';
    titleRow.innerHTML = `<span class="cat-icon-big">${CATS[cat].icon}</span><span class="cat-name">${CATS[cat].label}</span><div class="cat-line"></div>`;
    sec.appendChild(titleRow);

    // Dishes
    groups[cat].forEach(dish => {
      const row = document.createElement('div');
      row.className = 'dish-row';

      row.innerHTML = `
        <div class="dish-photo" style="background:linear-gradient(135deg,${dish.bg[0]}33,${dish.bg[1]}66)">
          <span>${dish.emoji}</span>
          <div class="cam-overlay">
            <span class="cam">📷</span>
            <span class="cam-txt">3D View</span>
          </div>
        </div>
        <div class="dish-info">
          <div class="dish-name">${dish.name}</div>
          <div class="dish-price">${dish.price}</div>
          <div class="dish-desc">${dish.desc}</div>
          <div class="ar-hint-row">📷 Tap photo → View in AR</div>
        </div>
        <div class="dish-badge">${dish.badge}</div>
      `;

      row.addEventListener('click', () => openAR(dish));
      sec.appendChild(row);
    });

    body.appendChild(sec);
  });
}

// ── Tabs ──
document.getElementById('tabsEl').addEventListener('click', e => {
  if (!e.target.classList.contains('tab')) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  activeCat = e.target.dataset.cat;
  render();
});

// ── Search ──
document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase().trim();
  activeCat = 'all';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab[data-cat="all"]').classList.add('active');
  render();
});

// ── AR Viewer ──
const mv = document.getElementById('mv');

const GLB = {
  pizza:    'https://modelviewer.dev/shared-assets/models/Astronaut.glb',
  burger:   'https://modelviewer.dev/shared-assets/models/Astronaut.glb',
  momos:    'https://modelviewer.dev/shared-assets/models/Astronaut.glb',
  pasta:    'https://modelviewer.dev/shared-assets/models/Astronaut.glb',
  sandwich: 'https://modelviewer.dev/shared-assets/models/Astronaut.glb',
  roll:     'https://modelviewer.dev/shared-assets/models/Astronaut.glb',
  fries:    'https://modelviewer.dev/shared-assets/models/Astronaut.glb',
  shakes:   'https://modelviewer.dev/shared-assets/models/Astronaut.glb',
  coffee:   'https://modelviewer.dev/shared-assets/models/Astronaut.glb',
  dessert:  'https://modelviewer.dev/shared-assets/models/Astronaut.glb',
  bread:    'https://modelviewer.dev/shared-assets/models/Astronaut.glb',
};

function openAR(dish) {
  document.getElementById('arName').textContent = dish.name;
  document.getElementById('arPrice').textContent = dish.price;
  document.getElementById('posterEmoji').textContent = dish.emoji;
  mv.src = GLB[dish.cat] || GLB.pizza;

  const modal = document.getElementById('arModal');
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Reset drag hint animation
  const dh = document.getElementById('dragHint');
  dh.style.animation = 'none';
  void dh.offsetWidth;
  dh.style.animation = 'hintFade 3.5s forwards';

  // Set AR button text based on device
  const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
  const isAndroid = /Android/i.test(navigator.userAgent);
  const btnTxt = document.getElementById('arBtnTxt');
  const subTxt = document.getElementById('arSubTxt');

  if (isIOS) {
    btnTxt.textContent = 'View in AR — Quick Look';
    subTxt.textContent = 'iPhone AR — table pe rakhke dekho';
  } else if (isAndroid) {
    btnTxt.textContent = 'View in AR — Camera Open Karo';
    subTxt.textContent = 'Android AR — table pe rakhke dekho';
  } else {
    btnTxt.textContent = '3D Rotate Karo — Phone pe AR milega';
    subTxt.textContent = 'Phone mein kholо AR ke liye';
  }
}

document.getElementById('arBtn').addEventListener('click', () => {
  if (mv.canActivateAR) {
    mv.activateAR();
  } else {
    alert('Phone ke Chrome ya Safari browser mein kholо — AR activate hoga! 📱');
  }
});

document.getElementById('arClose').addEventListener('click', () => {
  document.getElementById('arModal').classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(() => { mv.src = ''; }, 300);
});

// ── Init ──
render();
</script>
</body>
